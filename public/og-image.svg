<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a017"/>
      <stop offset="50%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#d4a017"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Pixel-art style border accents -->
  <rect x="40" y="40" width="1120" height="550" rx="4" fill="none" stroke="#222" stroke-width="1"/>
  <rect x="48" y="48" width="1104" height="534" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Gold accent line -->
  <rect x="60" y="120" width="1080" height="2" fill="url(#gold)" opacity="0.4"/>
  <rect x="60" y="508" width="1080" height="2" fill="url(#gold)" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f1e8d5" letter-spacing="-0.5">TaskBar Hero Wiki</text>
  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="monospace" font-size="28" fill="url(#gold)" letter-spacing="6">物品 · 英雄 · 掉率 · Steam 市场</text>
  <!-- Stats row -->
  <rect x="120" y="380" width="180" height="90" rx="2" fill="#111" stroke="#252525" stroke-width="1"/>
  <text x="210" y="415" text-anchor="middle" font-family="monospace" font-size="32" fill="#f0c040" font-weight="600">5,934</text>
  <text x="210" y="448" text-anchor="middle" font-family="system-ui" font-size="14" fill="#777">物品 Items</text>

  <rect x="340" y="380" width="180" height="90" rx="2" fill="#111" stroke="#252525" stroke-width="1"/>
  <text x="430" y="415" text-anchor="middle" font-family="monospace" font-size="32" fill="#f0c040" font-weight="600">6</text>
  <text x="430" y="448" text-anchor="middle" font-family="system-ui" font-size="14" fill="#777">英雄 Heroes</text>

  <rect x="560" y="380" width="180" height="90" rx="2" fill="#111" stroke="#252525" stroke-width="1"/>
  <text x="650" y="415" text-anchor="middle" font-family="monospace" font-size="32" fill="#f0c040" font-weight="600">120</text>
  <text x="650" y="448" text-anchor="middle" font-family="system-ui" font-size="14" fill="#777">关卡 Stages</text>

  <rect x="780" y="380" width="180" height="90" rx="2" fill="#111" stroke="#252525" stroke-width="1"/>
  <text x="870" y="415" text-anchor="middle" font-family="monospace" font-size="32" fill="#f0c040" font-weight="600">197</text>
  <text x="870" y="448" text-anchor="middle" font-family="system-ui" font-size="14" fill="#777">符文 Runes</text>

  <!-- Footer -->
  <text x="600" y="565" text-anchor="middle" font-family="system-ui" font-size="15" fill="#555">taskbarherohub.wiki · 中文优先的双语数据库 · Bilingual Database</text>
</svg>
